services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sampling_assiste
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=64MB
        -c maintenance_work_mem=256MB
        -c synchronous_commit=off
        -c wal_level=minimal
        -c max_wal_senders=0
        -c checkpoint_completion_target=0.9
        -c max_wal_size=4GB
        -c autovacuum=off
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Airflow — base de données interne (SQLite non recommandé en prod)
  # ---------------------------------------------------------------------------
  airflow-init:
    build:
      context: .
      dockerfile: airflow.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: db migrate
    restart: on-failure

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow.Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DISCOGS_TOKEN: ${DISCOGS_TOKEN}
      PG_DSN: postgresql://postgres:postgres@postgres:5432/sampling_assiste
      NEON_PASSWORD: ${NEON_PASSWORD}
      NEON_HOST: ${NEON_HOST:-ep-mute-lab-abl7t5in.eu-west-2.aws.neon.tech}
      NEON_USER: ${NEON_USER:-neondb_owner}
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts:ro
    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow.Dockerfile
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - airflow_logs:/opt/airflow/logs
      - ./scripts:/opt/airflow/scripts:ro
    command: scheduler
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # FastAPI
  # ---------------------------------------------------------------------------
  api:
    build: ./api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://postgres:postgres@postgres:5432/sampling_assiste
      NEON_DSN: ${NEON_DSN}
      DISCOGS_TOKEN: ${DISCOGS_TOKEN}
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
