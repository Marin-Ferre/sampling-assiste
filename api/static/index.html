<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sampling Assisté</title>

  <!-- noUiSlider -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
  <!-- TomSelect -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #333;
      --accent: #c9a84c;
      --accent2: #a07830;
      --text: #e8e8e8;
      --muted: #888;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 20px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px 32px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .filter-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .slider-container { padding: 8px 4px; }

    .slider-values {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--accent);
      font-weight: 600;
      margin-top: 8px;
    }

    /* noUiSlider theme */
    .noUi-target {
      background: var(--surface2);
      border: 1px solid var(--border);
      box-shadow: none;
      height: 4px;
    }
    .noUi-connect { background: var(--accent); }
    .noUi-handle {
      background: var(--accent);
      border: none;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.3);
      border-radius: 50%;
      width: 18px !important;
      height: 18px !important;
      top: -8px !important;
      right: -9px !important;
      cursor: pointer;
    }
    .noUi-handle::before, .noUi-handle::after { display: none; }

    /* TomSelect theme override */
    .ts-wrapper.multi .ts-control {
      background: var(--surface2) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
      border-radius: 8px !important;
      padding: 6px 10px !important;
      min-height: 42px;
    }
    .ts-wrapper.multi .ts-control input { color: var(--text) !important; }
    .ts-wrapper .ts-dropdown {
      background: var(--surface2) !important;
      border-color: var(--border) !important;
      color: var(--text) !important;
    }
    .ts-wrapper .ts-dropdown .option:hover,
    .ts-wrapper .ts-dropdown .option.active {
      background: var(--accent2) !important;
      color: #fff !important;
    }
    .ts-wrapper .ts-control .item {
      background: var(--accent2) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 4px !important;
      font-size: 0.78rem;
    }

    .btn-randomize {
      width: 100%;
      max-width: 700px;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 28px;
    }
    .btn-randomize:hover { background: #dfc060; }
    .btn-randomize:active { transform: scale(0.98); }
    .btn-randomize:disabled { background: #555; color: #888; cursor: not-allowed; }

    /* Result card */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 700px;
      overflow: hidden;
      display: none;
    }
    .result-card.visible { display: block; }

    .result-inner {
      display: flex;
      gap: 0;
    }

    .cover-wrapper {
      flex-shrink: 0;
      width: 220px;
      height: 220px;
      background: var(--surface2);
      position: relative;
      overflow: hidden;
    }
    .cover-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .cover-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--border);
    }

    .result-info {
      padding: 24px 28px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }
    .result-artist {
      font-size: 0.95rem;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .result-meta {
      font-size: 0.8rem;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .tag.accent { border-color: var(--accent2); color: var(--accent); }

    .result-scores {
      display: flex;
      gap: 16px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .score-item { display: flex; flex-direction: column; gap: 2px; }
    .score-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .score-value { font-size: 1rem; font-weight: 700; color: var(--accent); }

    .result-footer {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--border);
    }
    .result-link {
      display: block;
      flex: 1;
      padding: 12px 28px;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }
    .result-link:hover { color: var(--accent); background: var(--surface2); }

    .btn-like {
      padding: 12px 20px;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      cursor: pointer;
      font-size: 1.3rem;
      transition: transform 0.15s;
      line-height: 1;
    }
    .btn-like:hover { transform: scale(1.2); }
    .btn-like.liked { filter: none; }

    /* Nav tabs */
    .nav {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
    }
    .nav-tab {
      padding: 8px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

    /* Views */
    .view { display: none; width: 100%; max-width: 700px; flex-direction: column; align-items: center; }
    .view.active { display: flex; }

    /* Likes list */
    .likes-list { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .like-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      transition: border-color 0.2s;
    }
    .like-item:hover { border-color: var(--accent2); }
    .like-cover {
      width: 52px;
      height: 52px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--border);
      overflow: hidden;
    }
    .like-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
    .like-info { flex: 1; min-width: 0; }
    .like-title { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .like-artist { font-size: 0.8rem; color: var(--accent); }
    .like-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .like-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .like-btn-small {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .like-btn-small:hover { border-color: var(--accent); color: var(--accent); }
    .like-btn-remove { }
    .like-btn-remove:hover { border-color: #e07070; color: #e07070; }
    .likes-empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 40px; }

    .youtube-section {
      border-top: 1px solid var(--border);
      background: #000;
      position: relative;
    }
    .youtube-section iframe {
      display: block;
      width: 100%;
      height: 260px;
      border: none;
    }
    .youtube-label {
      position: absolute;
      top: 8px;
      left: 12px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    .error-msg {
      text-align: center;
      color: #e07070;
      font-size: 0.9rem;
      padding: 20px;
      display: none;
    }
    .error-msg.visible { display: block; }

    @media (max-width: 600px) {
      body { padding: 20px 12px; }

      h1 { font-size: 1.3rem; margin-bottom: 4px; }
      .subtitle { margin-bottom: 24px; }

      .card { padding: 18px 16px; margin-bottom: 14px; }
      .filters-grid { grid-template-columns: 1fr; gap: 20px; }
      .filter-group.full { grid-column: 1; }

      .btn-randomize { padding: 18px; font-size: 1.05rem; margin-bottom: 18px; }

      /* Result card en colonne */
      .result-inner { flex-direction: column; }
      .cover-wrapper { width: 100%; height: 220px; }
      .result-info { padding: 16px; gap: 5px; }
      .result-title { font-size: 1.05rem; }

      /* Scores sur 2 colonnes */
      .result-scores {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding-top: 10px;
      }

      /* YouTube plus court */
      .youtube-section iframe { height: 200px; }

      /* Footer */
      .result-link { padding: 12px 16px; font-size: 0.75rem; }
      .btn-like { padding: 12px 16px; }

      /* Nav */
      .nav { margin-bottom: 20px; }
      .nav-tab { padding: 8px 14px; font-size: 0.75rem; }

      /* Likes */
      .like-item { padding: 10px 12px; gap: 10px; }
      .like-cover { width: 44px; height: 44px; }
      .like-title { font-size: 0.85rem; }
      .like-actions { flex-direction: column; gap: 4px; }
      .like-btn-small { padding: 4px 8px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

  <h1>Sampling Assisté</h1>
  <p class="subtitle">Trouve ton prochain sample</p>

  <div class="nav">
    <button class="nav-tab active" onclick="showView('discover')">Découverte</button>
    <button class="nav-tab" onclick="showView('likes')" id="tab-likes">♥ Mes likes</button>
  </div>

  <!-- VIEW: Découverte -->
  <div class="view active" id="view-discover">

  <div class="card">
    <div class="filters-grid">

      <!-- Popularity score -->
      <div class="filter-group">
        <label>Popularité</label>
        <div class="slider-container">
          <div id="slider-popularity"></div>
          <div class="slider-values">
            <span id="pop-min-val">0</span>
            <span id="pop-max-val">100</span>
          </div>
        </div>
      </div>

      <!-- Période -->
      <div class="filter-group">
        <label>Période</label>
        <div class="slider-container">
          <div id="slider-year"></div>
          <div class="slider-values">
            <span id="year-min-val">—</span>
            <span id="year-max-val">—</span>
          </div>
        </div>
      </div>

      <!-- Genres -->
      <div class="filter-group">
        <label>Genres</label>
        <select id="select-genres" multiple placeholder="Tous les genres..."></select>
      </div>

      <!-- Pays / Régions -->
      <div class="filter-group">
        <label>Pays</label>
        <select id="select-countries" multiple placeholder="Tous les pays..."></select>
      </div>

    </div>
  </div>

  <button class="btn-randomize" id="btn-randomize">🎲 Randomiser</button>

  <div class="error-msg" id="error-msg"></div>

  <div class="result-card" id="result-card">
    <div class="result-inner">
      <div class="cover-wrapper" id="cover-wrapper">
        <div class="cover-placeholder" id="cover-placeholder">♪</div>
        <img id="cover-img" src="" alt="Cover" style="display:none" />
      </div>
      <div class="result-info">
        <div class="result-title" id="res-title"></div>
        <div class="result-artist" id="res-artist"></div>
        <div class="result-meta" id="res-meta"></div>
        <div id="res-tags"></div>
        <div class="result-scores">
          <div class="score-item">
            <span class="score-label">Popularité</span>
            <span class="score-value" id="res-popularity"></span>
          </div>
          <div class="score-item">
            <span class="score-label">Rareté</span>
            <span class="score-value" id="res-rarity"></span>
          </div>
          <div class="score-item">
            <span class="score-label">Have</span>
            <span class="score-value" id="res-have"></span>
          </div>
          <div class="score-item">
            <span class="score-label">Want</span>
            <span class="score-value" id="res-want"></span>
          </div>
          <div class="score-item" id="score-price-wrap">
            <span class="score-label">Prix min</span>
            <span class="score-value" id="res-price"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="youtube-section" id="youtube-section" style="display:none">
      <span class="youtube-label" id="youtube-video-title">YouTube</span>
      <iframe id="youtube-iframe"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
    <div class="result-footer">
      <a class="result-link" id="res-link" href="#" target="_blank">Voir sur Discogs →</a>
      <button class="btn-like" id="btn-like" title="Liker" onclick="toggleLike()">🤍</button>
    </div>
  </div>

  </div><!-- end view-discover -->

  <!-- VIEW: Likes -->
  <div class="view" id="view-likes">
    <div class="likes-list" id="likes-list"></div>
  </div>

  <script>
    let sliderPop, sliderYear;
    let tsGenres, tsCountries;
    let currentAlbum = null;
    let likedIds = new Set();

    // ── Navigation ────────────────────────────────────────────────────────────
    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`view-${name}`).classList.add('active');
      event.target.classList.add('active');
      if (name === 'likes') loadLikes();
    }

    // ── Likes ─────────────────────────────────────────────────────────────────
    async function toggleLike() {
      if (!currentAlbum) return;
      const id = currentAlbum.discogs_id;
      const btn = document.getElementById('btn-like');
      if (likedIds.has(id)) {
        await fetch(`/api/like/${id}`, { method: 'DELETE' });
        likedIds.delete(id);
        btn.textContent = '🤍';
      } else {
        await fetch(`/api/like/${id}`, { method: 'POST' });
        likedIds.add(id);
        btn.textContent = '❤️';
      }
    }

    async function loadLikes() {
      const res = await fetch('/api/likes');
      const likes = await res.json();
      likedIds = new Set(likes.map(l => l.discogs_id));

      const container = document.getElementById('likes-list');
      if (!likes.length) {
        container.innerHTML = '<p class="likes-empty">Aucun like pour l\'instant — utilise ♥ sur un album pour le sauvegarder.</p>';
        return;
      }
      container.innerHTML = likes.map(a => `
        <div class="like-item" id="like-${a.discogs_id}">
          <div class="like-cover" id="like-cover-${a.discogs_id}">♪</div>
          <div class="like-info">
            <div class="like-title">${a.title || '—'}</div>
            <div class="like-artist">${a.artist || '—'}</div>
            <div class="like-meta">${[a.year, a.country, (a.genres||[]).join(', ')].filter(Boolean).join(' · ')} · popularité ${a.popularity_score ?? '—'}/100</div>
          </div>
          <div class="like-actions">
            <a class="like-btn-small" href="https://www.discogs.com/release/${a.discogs_id}" target="_blank">Discogs</a>
            <button class="like-btn-small like-btn-remove" onclick="removeLike(${a.discogs_id})">✕</button>
          </div>
        </div>
      `).join('');

      // Charge les covers en arrière-plan
      likes.forEach(a => {
        const coverEl = document.getElementById(`like-cover-${a.discogs_id}`);
        if (!coverEl) return;
        const img = new Image();
        img.onload = () => { coverEl.innerHTML = ''; coverEl.appendChild(img); };
        img.src = `/api/cover/${a.discogs_id}`;
      });
    }

    async function removeLike(id) {
      await fetch(`/api/like/${id}`, { method: 'DELETE' });
      likedIds.delete(id);
      const el = document.getElementById(`like-${id}`);
      if (el) el.remove();
      // Met à jour le cœur si c'est l'album courant
      if (currentAlbum?.discogs_id === id) {
        document.getElementById('btn-like').textContent = '🤍';
      }
    }

    // ── Init filters ──────────────────────────────────────────────────────────
    async function initFilters() {
      const res = await fetch('/api/filters');
      const data = await res.json();

      // Popularity slider
      sliderPop = noUiSlider.create(document.getElementById('slider-popularity'), {
        start: [0, 100],
        connect: true,
        range: { min: 0, max: 100 },
        step: 1,
      });
      sliderPop.on('update', (values) => {
        document.getElementById('pop-min-val').textContent = Math.round(values[0]);
        document.getElementById('pop-max-val').textContent = Math.round(values[1]);
      });

      // Year slider
      const yMin = data.year_min || 1955;
      const yMax = data.year_max || 1990;
      sliderYear = noUiSlider.create(document.getElementById('slider-year'), {
        start: [yMin, yMax],
        connect: true,
        range: { min: yMin, max: yMax },
        step: 1,
      });
      sliderYear.on('update', (values) => {
        document.getElementById('year-min-val').textContent = Math.round(values[0]);
        document.getElementById('year-max-val').textContent = Math.round(values[1]);
      });

      // Genres select
      tsGenres = new TomSelect('#select-genres', {
        options: (data.genres || []).filter(g => g).map(g => ({ value: g, text: g })),
        plugins: ['remove_button'],
        maxOptions: 200,
      });

      // Countries select
      tsCountries = new TomSelect('#select-countries', {
        options: (data.countries || []).filter(c => c).map(c => ({ value: c, text: c })),
        plugins: ['remove_button'],
        maxOptions: 300,
      });
    }

    // ── Randomize ─────────────────────────────────────────────────────────────
    document.getElementById('btn-randomize').addEventListener('click', async () => {
      const btn = document.getElementById('btn-randomize');
      const errorEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = '⏳ Recherche...';
      errorEl.classList.remove('visible');

      const popValues = sliderPop.get();
      const yearValues = sliderYear.get();
      const genres = tsGenres.getValue();
      const countries = tsCountries.getValue();

      const params = new URLSearchParams({
        popularity_min: Math.round(popValues[0]),
        popularity_max: Math.round(popValues[1]),
        year_min: Math.round(yearValues[0]),
        year_max: Math.round(yearValues[1]),
      });
      genres.forEach(g => params.append('genres', g));
      countries.forEach(c => params.append('countries', c));

      try {
        const res = await fetch(`/api/random?${params}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Erreur serveur');
        }
        const album = await res.json();
        await loadLikes();
        displayAlbum(album);
      } catch (e) {
        errorEl.textContent = e.message;
        errorEl.classList.add('visible');
        document.getElementById('result-card').classList.remove('visible');
      } finally {
        btn.disabled = false;
        btn.textContent = '🎲 Randomiser';
      }
    });

    // ── Display album ─────────────────────────────────────────────────────────
    function displayAlbum(a) {
      currentAlbum = a;
      // État du like
      document.getElementById('btn-like').textContent = likedIds.has(a.discogs_id) ? '❤️' : '🤍';
      document.getElementById('res-title').textContent = a.title || '—';
      document.getElementById('res-artist').textContent = a.artist || '—';
      document.getElementById('res-popularity').textContent = `${a.popularity_score ?? '—'} / 100`;
      document.getElementById('res-rarity').textContent = a.rarity_score ?? '—';
      document.getElementById('res-have').textContent = (a.community_have ?? 0).toLocaleString();
      document.getElementById('res-want').textContent = (a.community_want ?? 0).toLocaleString();

      const priceWrap = document.getElementById('score-price-wrap');
      if (a.lowest_price) {
        document.getElementById('res-price').textContent = `$${a.lowest_price}`;
        priceWrap.style.display = '';
      } else {
        priceWrap.style.display = 'none';
      }

      // Meta line
      const meta = [];
      if (a.year) meta.push(a.year);
      if (a.country) meta.push(a.country);
      if (a.label) meta.push(a.label);
      document.getElementById('res-meta').textContent = meta.join(' · ');

      // Tags genres + styles
      const tagsEl = document.getElementById('res-tags');
      const allTags = [...(a.genres || []), ...(a.styles || [])];
      tagsEl.innerHTML = allTags.map((t, i) =>
        `<span class="tag${i < (a.genres || []).length ? ' accent' : ''}">${t}</span>`
      ).join(' ');

      // Discogs link
      document.getElementById('res-link').href = `https://www.discogs.com/release/${a.discogs_id}`;

      // Cover
      const img = document.getElementById('cover-img');
      const placeholder = document.getElementById('cover-placeholder');
      img.style.display = 'none';
      placeholder.style.display = 'flex';
      img.src = `/api/cover/${a.discogs_id}`;
      img.onload = () => {
        img.style.display = 'block';
        placeholder.style.display = 'none';
      };
      img.onerror = () => {
        img.style.display = 'none';
        placeholder.style.display = 'flex';
      };

      document.getElementById('result-card').classList.add('visible');

      // YouTube — recherche via backend
      const ytSection = document.getElementById('youtube-section');
      const ytIframe = document.getElementById('youtube-iframe');
      const ytLabel = document.getElementById('youtube-video-title');
      ytSection.style.display = 'none';
      ytIframe.src = '';

      fetch(`/api/youtube?artist=${encodeURIComponent(a.artist)}&title=${encodeURIComponent(a.title)}`)
        .then(r => r.ok ? r.json() : null)
        .then(yt => {
          if (!yt) return;
          ytIframe.src = `https://www.youtube.com/embed/${yt.video_id}?autoplay=0`;
          ytLabel.textContent = `YouTube · ${yt.video_title}`;
          ytSection.style.display = 'block';
        })
        .catch(() => {});

      document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    initFilters();
  </script>
</body>
</html>
